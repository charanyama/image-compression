<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Compressor</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="shortcut icon" href="static/favicon.ico" type="image/x-icon">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f5;
            --text-primary: #000000;
            --text-secondary: #666666;
            --accent: #000000;
            --accent-light: #333333;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
            position: relative;
        }

        /* Subtle Abstract Background Elements */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 0, 0, 0.05) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: float 20s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -30%;
            left: -5%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 0, 0, 0.03) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: float 25s ease-in-out infinite reverse;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px) translateX(0px);
            }

            50% {
                transform: translateY(30px) translateX(-20px);
            }
        }

        /* Decorative circles */
        .deco {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        .deco-1 {
            width: 120px;
            height: 120px;
            background: #000000;
            opacity: 0.08;
            top: 15%;
            left: 5%;
            animation: drift 30s ease-in-out infinite;
        }

        .deco-2 {
            width: 80px;
            height: 80px;
            background: #000000;
            opacity: 0.06;
            bottom: 20%;
            right: 8%;
            animation: drift 35s ease-in-out infinite reverse;
        }

        .deco-3 {
            width: 150px;
            height: 150px;
            background: #000000;
            opacity: 0.04;
            top: 50%;
            right: 3%;
            animation: drift 40s ease-in-out infinite;
        }

        @keyframes drift {

            0%,
            100% {
                transform: translate(0, 0);
            }

            25% {
                transform: translate(15px, -20px);
            }

            50% {
                transform: translate(-10px, 25px);
            }

            75% {
                transform: translate(20px, 10px);
            }
        }

        main {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .hero {
            text-align: center;
            max-width: 700px;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 20px;
            letter-spacing: -1px;
            line-height: 1.2;
        }

        .hero p {
            font-size: clamp(1rem, 3vw, 1.3rem);
            color: var(--text-secondary);
            margin-bottom: 40px;
            font-weight: 300;
            line-height: 1.6;
            letter-spacing: 0.3px;
        }

        .button {
            display: inline-block;
            padding: 16px 48px;
            background: #000000;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            border: none;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .button:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.25);
        }

        .button:hover::before {
            width: 300px;
            height: 300px;
        }

        .button:active {
            transform: translateY(-2px);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            h1 {
                margin-bottom: 15px;
            }

            .hero p {
                margin-bottom: 30px;
            }

            .button {
                padding: 14px 40px;
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            main {
                padding: 15px;
            }

            h1 {
                margin-bottom: 12px;
            }

            .hero p {
                margin-bottom: 25px;
            }

            .button {
                padding: 12px 32px;
                font-size: 0.95rem;
            }
        }
    </style>
</head>

<body>
    <div class="deco deco-1"></div>
    <div class="deco deco-2"></div>
    <div class="deco deco-3"></div>

    <main>
        <section class="hero">
            <h1>KMeans Image Compression</h1>
            <p>Compress images using machine learning and color clustering.</p>
            <a href="/compress" class="button">Try Now</a>
        </section>
    </main>

</body>

</html>
